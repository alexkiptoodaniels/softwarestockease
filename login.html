<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stock Ease</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Stock Ease</a>
            <div class="nav-links">
                <a href="inventory.html" class="nav-link">📦 Inventory</a>
            </div>
            <button id="darkModeToggle" class="theme-toggle" aria-label="Toggle dark mode">
                <span class="toggle-icon">☀️</span>
            </button>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h1>Login to Stock Ease</h1>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username or email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="login-button">Login</button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
                <p><a href="#">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="script.js"></script>
</body>
</html>
